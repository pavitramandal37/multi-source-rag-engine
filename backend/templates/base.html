{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ app_title }}{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">Grounded RAG</span>
    <a href="/" class="nav-link {% block nav_chat %}{% endblock %}">Chat</a>
    <a href="/sources/" class="nav-link {% block nav_sources %}{% endblock %}">Sources</a>
    <a href="/setup/" class="nav-link {% block nav_setup %}{% endblock %}">Setup</a>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
